name: Add issues to project board

# Auto-adds every newly opened issue in this repo to the user's project board #3.
# Replicate this file in other repos to feed the same board from anywhere.
# Requires a secret ADD_TO_PROJECT_PAT (classic PAT with `project` + `repo`, or a
# fine-grained token with Projects read/write). A user-level secret lets all repos
# share one token. See issue #3 for setup.

on:
  issues:
    types: [opened, reopened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/tommyroar/projects/3
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
